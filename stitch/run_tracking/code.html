<header class="fixed top-0 w-full z-50 bg-gradient-to-b from-[#060e20] to-transparent">

</div>
<div class="bg-surface-container-high/80 backdrop-blur-md p-2 rounded-full border border-outline-variant/20">

</div>
</div>
</section>

<section class="w-full max-w-md flex flex-col items-center mb-8">

            </h1>
</section>

<section class="w-full max-w-md grid grid-cols-2 gap-4 mb-12">
<!-- Distance Card -->
<div class="col-span-1 bg-surface-container-low p-6 rounded-lg flex flex-col justify-end min-h-[160px] translate-y-4">

<div class="flex items-baseline gap-1">
<span class="text-5xl font-black font-headline text-on-surface">6.42</span>
<span class="text-primary-container font-headline font-bold">KM</span>
</div>
</div>
<!-- Pace Card -->
<div class="col-span-1 bg-surface-container-high p-6 rounded-lg flex flex-col justify-end min-h-[160px]">

<div class="flex items-baseline gap-1">
<span class="text-5xl font-black font-headline text-secondary">4'58"</span>
</div>
<div class="mt-4 flex items-center gap-2">
<div class="flex-1 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-secondary shadow-[0_0_10px_#00e3fd]"></div>
</div>
</div>
</div>

<div class="flex flex-col">
<p class="text-on-surface-variant font-headline font-bold uppercase tracking-widest text-[10px]">Calories</p>
<span class="text-2xl font-black font-headline">542 <span class="text-sm font-normal text-on-surface-variant">KCAL</span></span>
</div>
<div class="h-10 w-[1px] bg-outline-variant/30"></div>
<div class="flex flex-col items-end">
<p class="text-on-surface-variant font-headline font-bold uppercase tracking-widest text-[10px]">Heart Rate</p>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error animate-pulse" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-2xl font-black font-headline">164 <span class="text-sm font-normal text-on-surface-variant">BPM</span></span>
</div>
</div>
</div>
</section>

<div class="w-10 h-10 bg-on-primary-fixed rounded-sm group-active:scale-110 transition-transform"></div>
</button>

<button class="w-20 h-20 rounded-full border-2 border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors active:scale-90">
<span class="material-symbols-outlined scale-150">timer</span>
</button>

<span class="font-['Lexend'] font-bold text-[10px] uppercase tracking-tighter">Profile</span>
