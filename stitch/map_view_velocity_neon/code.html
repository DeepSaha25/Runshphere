<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .track-glow-primary {
            filter: drop-shadow(0 0 8px #cafd00);
        }
        .track-glow-secondary {
            filter: drop-shadow(0 0 8px #00e3fd);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#060e20] bg-opacity-60 backdrop-blur-xl shadow-[0_4px_30px_rgba(0,0,0,0.1)] flex items-center justify-between px-6 h-20 w-full">
<div class="flex items-center gap-4">
<button class="text-[#cafd00] hover:text-[#00e3fd] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Lexend'] font-black tracking-tighter uppercase text-2xl italic text-[#cafd00] drop-shadow-[0_0_10px_rgba(202,253,0,0.5)]">TRACKKING</h1>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8 font-['Lexend'] text-sm font-bold tracking-widest">
<a class="text-[#cafd00] uppercase" href="#">EXPLORE</a>
<a class="text-slate-400 hover:text-[#00e3fd] transition-colors uppercase" href="#">TRACKS</a>
<a class="text-slate-400 hover:text-[#00e3fd] transition-colors uppercase" href="#">ALERTS</a>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed shadow-[0_0_10px_rgba(202,253,0,0.3)]">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up portrait of an athletic user with dramatic neon rim lighting against a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_rGkGYu3VH352lrvdiiYxEdnpUIdmvm067g2pIhU4lpf6lrfCITkoh2JbG4JoAS7hZyy5m7tfMeiL5ly68AMv6FgPNlsiztSe89hsOONHyGWuUQu35f91lp93DSgJp84vsto9EvwQ_acB6B0Y3A835qvf-7fdr0o1gd1VibimtKOiK1485oF-s3vt_YnAg28jhajCK2Yu_W-XphoE7AUIdnCUDkNKJ2QMrG6p1XeI-WzKUCTnqXhd-yxVMP1FAITuVAk6dLUn1R9O"/>
</div>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative w-full h-screen bg-surface-container-lowest overflow-hidden">
<!-- Mock Map Visual -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-[#060e20]" style="background-image: radial-gradient(circle at 50% 50%, #0f1930 0%, #060e20 100%);"></div>
<!-- Map Grid/Lines simulation -->
<div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(#40485d 1px, transparent 1px), linear-gradient(90deg, #40485d 1px, transparent 1px); background-size: 100px 100px;"></div>
<!-- Track 1: Owned (Neon Green) -->
<svg class="absolute top-[20%] left-[15%] w-[400px] h-[300px] track-glow-primary overflow-visible" viewbox="0 0 400 300">
<path d="M10,250 Q100,50 200,150 T380,50" fill="none" stroke="#cafd00" stroke-linecap="round" stroke-width="6"></path>
<circle cx="10" cy="250" fill="#cafd00" r="8"></circle>
<g transform="translate(190, 120)">
<circle cx="10" cy="10" fill="#060e20" r="14" stroke="#cafd00" stroke-width="2"></circle>
</g></svg><span class="material-symbols-outlined text-primary-fixed absolute -translate-x-1/2 -translate-y-1/2" data-icon="crown" style="font-size: 16px; font-variation-settings: 'FILL' 1;">crown</span>
<!-- Track 2: Contested (Neon Blue) -->
<svg class="absolute top-[45%] left-[50%] w-[350px] h-[400px] track-glow-secondary overflow-visible" viewbox="0 0 350 400">
<path d="M50,10 C150,100 20,300 300,380" fill="none" stroke="#00e3fd" stroke-dasharray="12 8" stroke-linecap="round" stroke-width="6"></path>
<circle cx="50" cy="10" fill="#00e3fd" r="8"></circle>
<g transform="translate(285, 365)">
<circle cx="10" cy="10" fill="#060e20" r="14" stroke="#00e3fd" stroke-width="2"></circle>
</g></svg><span class="material-symbols-outlined text-secondary absolute -translate-x-1/2 -translate-y-1/2" data-icon="swords" style="font-size: 16px;">swords</span>
<!-- Map UI Elements: Floating Legend -->
<div class="absolute top-24 right-6 flex flex-col gap-3 z-10">
<div class="bg-surface-container-high bg-opacity-80 backdrop-blur-md p-4 rounded-lg shadow-xl border border-outline-variant border-opacity-20">
<div class="flex items-center gap-3 mb-2">
<div class="w-3 h-3 rounded-full bg-primary-fixed shadow-[0_0_8px_#cafd00]"></div>
<span class="text-xs font-headline font-bold tracking-widest uppercase">My Territory</span>
</div>
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-secondary shadow-[0_0_8px_#00e3fd]"></div>
<span class="text-xs font-headline font-bold tracking-widest uppercase">Contested</span>
</div>
</div>
<div class="flex flex-col gap-2">
<button class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center text-on-surface shadow-lg hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center text-on-surface shadow-lg hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
</div>
<!-- Tapped Track Context Card -->
<div class="absolute bottom-32 left-6 right-6 md:left-auto md:right-10 md:w-96 z-20">
<div class="bg-surface-container-low glass-panel rounded-lg p-6 shadow-2xl border-l-4 border-secondary">
<div class="flex justify-between items-start mb-4">
<div>
<span class="text-secondary text-[10px] font-black tracking-[0.2em] uppercase">UNOWNED TRACK</span>
<h2 class="text-2xl font-headline font-black italic text-on-surface">SILICON SHORELINE</h2>
</div>
<div class="bg-secondary-container text-secondary-fixed px-3 py-1 rounded-full text-[10px] font-bold">
                            4.2 KM
                        </div>
</div>
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="bg-surface-container-high p-3 rounded-sm">
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Current Record</span>
<p class="text-lg font-headline font-bold text-secondary">14:22.04</p>
</div>
<div class="bg-surface-container-high p-3 rounded-sm">
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-wider">Elevation Gain</span>
<p class="text-lg font-headline font-bold text-on-surface">124M</p>
</div>
</div>
<button class="w-full bg-gradient-to-tr from-[#f3ffca] to-[#cafd00] text-[#3a4a00] font-headline font-black italic py-4 rounded-xl shadow-[0_0_20px_rgba(202,253,0,0.4)] flex items-center justify-center gap-3 hover:scale-[1.02] transition-transform">
<span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        RACE NOW
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-8 pb-8 pt-4 bg-[#060e20] bg-opacity-80 backdrop-blur-2xl rounded-t-[3rem] z-50 shadow-[0_-10px_40px_rgba(202,253,0,0.15)] md:hidden">
<div class="flex flex-col items-center justify-center bg-gradient-to-tr from-[#f3ffca] to-[#cafd00] text-[#3a4a00] rounded-full px-6 py-2 shadow-[0_0_20px_rgba(202,253,0,0.4)] transition-all">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase tracking-widest mt-1">EXPLORE</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 hover:text-[#00e3fd] transition-all">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase tracking-widest mt-1">TRACKS</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 hover:text-[#00e3fd] transition-all">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Lexend'] text-[10px] font-bold uppercase tracking-widest mt-1">ALERTS</span>
</div>
</nav>
<!-- Decorative Corner Element -->
<div class="hidden lg:block fixed bottom-0 right-0 p-12 pointer-events-none opacity-20">
<span class="font-headline font-black text-9xl text-primary-fixed italic tracking-tighter">KING</span>
</div>
</body></html>
